<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
    <form th:action="@{/login}" method="post" class="border p-4 shadow rounded" style="width: 300px;">
        <h3 class="text-center">Đăng nhập</h3>
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <p th:if="${error}" th:text="${error}" class="text-danger small"></p>
        <button type="submit" class="btn btn-primary w-100">Vào hệ thống</button>
    </form>
</body>
</html>
