<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết tin - 64131798</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div th:if="${tin != null}" class="card shadow">
        <div class="card-header bg-primary text-white">
            <h2 th:text="${tin.tieuDe}">Tiêu đề bài viết</h2>
        </div>
        <div class="card-body">
            <p class="badge bg-info text-dark" th:text="${tin.theLoaiTin.tenTheLoai}"></p>
            <hr>
            <p class="lead" style="white-space: pre-wrap;" th:text="${tin.noiDung}"></p>
        </div>
        <div class="card-footer">
            <a href="/danh-sach-the-loai" class="btn btn-outline-secondary">Quay lại danh mục</a>
        </div>
    </div>
    <div th:unless="${tin != null}" class="alert alert-danger">
        Không tìm thấy bài viết này!
    </div>
</body>
</html>
